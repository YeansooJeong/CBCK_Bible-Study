<div id="loginUx" class="login-ux">
  <style>
    #loginUx{--ink:#1e2b25;--forest:#24483a;--sage:#6f8f7a;--soft:#e8f0e7;--gold:#c9a65a;--paper:#fbfcf8;--line:#dce6dd;--muted:#6e7a73;font-family:Pretendard,"Noto Sans KR",system-ui,sans-serif;color:var(--ink);background:var(--paper);min-height:680px;padding:32px;box-sizing:border-box}#loginUx *{box-sizing:border-box}#loginUx .frame{max-width:1080px;margin:auto;display:grid;grid-template-columns:1.05fr .95fr;gap:26px;align-items:stretch}.brand{display:flex;align-items:center;gap:12px;font-weight:700;color:var(--forest)}.mark{width:38px;height:54px;background:linear-gradient(145deg,#d8bd76,#b78d36);color:#fff;display:grid;place-items:center;font-size:22px;clip-path:polygon(0 0,100% 0,100% 85%,50% 100%,0 85%)}.intro{padding:38px 10px}.eyebrow{margin:0 0 16px;color:#5d7e68;font-size:13px;font-weight:700;letter-spacing:.1em}.intro h1{font-size:clamp(31px,4vw,48px);line-height:1.15;letter-spacing:-.06em;margin:0 0 18px}.intro p{max-width:410px;color:var(--muted);line-height:1.75;margin:0}.bullets{display:grid;gap:12px;margin-top:34px;color:#4f6056;font-size:14px}.bullets span{display:flex;gap:10px;align-items:center}.dot{width:8px;height:8px;background:var(--gold);border-radius:50%}.auth{background:#fff;border:1px solid var(--line);border-radius:22px;padding:34px;box-shadow:0 18px 50px rgba(36,72,58,.1)}.auth h2{margin:0;font-size:24px;letter-spacing:-.04em}.sub{color:var(--muted);font-size:13px;line-height:1.6;margin:8px 0 22px}.steps{display:flex;gap:6px;margin-bottom:25px}.step{height:4px;flex:1;border-radius:9px;background:#edf1ed}.step.on{background:var(--sage)}.notice{background:#f6f8f4;border:1px solid #e2eade;border-radius:10px;padding:12px 13px;font-size:13px;line-height:1.55;margin-bottom:16px}.notice.error{background:#fff4f0;border-color:#f0d2c7;color:#8b4934}.field{display:grid;gap:7px;margin-top:14px}.field label{font-size:12px;font-weight:700}.field input{height:45px;border:1px solid #d5e0d7;border-radius:9px;padding:0 12px;color:var(--ink);outline:none;background:#fcfdfb}.field input:focus{border-color:var(--sage);box-shadow:0 0 0 3px #6f8f7a22}.primary,.secondary{width:100%;height:47px;border-radius:9px;font:inherit;font-weight:700;cursor:pointer}.primary{border:0;background:var(--forest);color:#fff;margin-top:20px}.secondary{border:1px solid #bfd0c2;background:#fff;color:var(--forest);margin-top:10px}.switch{border:0;background:none;color:var(--forest);font-size:12px;text-decoration:underline;cursor:pointer;margin-top:18px}.meta{display:flex;justify-content:space-between;align-items:center;margin-top:18px;color:var(--muted);font-size:12px}.admin-link{color:var(--forest);text-decoration:none;font-weight:700}.hidden{display:none}@media(max-width:760px){#loginUx{padding:20px}.frame{grid-template-columns:1fr!important}.intro{padding:10px 4px}.intro h1{font-size:34px}.bullets{display:none}.auth{padding:25px}}
  </style>
  <div class="frame">
    <section class="intro">
      <div class="brand"><span class="mark">✦</span><span>CBCK 문제은행</span></div>
      <div style="margin-top:88px"><p class="eyebrow">BIBLE STUDY · QUIZ BANK</p><h1>배운 것을<br><span style="color:var(--sage)">다시 꺼내는</span> 시간</h1><p>나만의 문제를 만들고, 반복해서 풀며 말씀을 더 깊이 기억해 보세요.</p><div class="bullets"><span><i class="dot"></i>개인 문제은행으로 차곡차곡</span><span><i class="dot"></i>오늘의 학습 흐름을 한눈에</span><span><i class="dot"></i>안전한 계정 인증과 세션 관리</span></div></div>
    </section>
    <section class="auth" aria-live="polite">
      <h2 id="title">학생 로그인</h2><p class="sub" id="subtitle">등록된 휴대전화로 계정을 확인합니다.</p>
      <div class="steps" aria-label="진행 단계"><i class="step on"></i><i class="step"></i><i class="step"></i></div>
      <div id="message" class="notice hidden"></div>
      <form id="phoneForm"><div class="field"><label for="phone">휴대전화</label><input id="phone" type="tel" inputmode="numeric" placeholder="휴대전화 (- 없이)" required></div><button class="primary">다음</button></form>
      <form id="loginForm" class="hidden"><div class="notice">등록된 계정입니다. 비밀번호를 입력해 주세요.</div><div class="field"><label for="password">비밀번호</label><input id="password" type="password" placeholder="비밀번호" required></div><button class="primary">로그인</button><button type="button" class="secondary back">휴대전화 다시 입력</button></form>
      <form id="activateForm" class="hidden"><div class="notice">첫 로그인입니다. 본인 확인 질문에 답하고 비밀번호를 설정해 주세요.</div><div class="field"><label for="name">이름</label><input id="name" placeholder="이름" required></div><div class="field"><label for="staff">간사 이름</label><input id="staff" placeholder="간사 이름" required></div><div class="field"><label for="leader">반장 이름</label><input id="leader" placeholder="반장 이름" required></div><div class="field"><label for="kjv">킹제임스 성경(영어) 출판연도</label><input id="kjv" inputmode="numeric" placeholder="예: 1611" required></div><div class="field"><label for="newPassword">새 비밀번호</label><input id="newPassword" type="password" minlength="8" placeholder="8자 이상" required></div><button class="primary">계정 활성화</button><button type="button" class="secondary back">휴대전화 다시 입력</button></form>
      <div id="notRegistered" class="hidden"><div class="notice">등록되지 않은 휴대전화입니다. 관리자에게 등록을 문의해 주세요.</div><button class="secondary back">돌아가기</button></div>
      <div class="meta"><span>처음 방문하셨나요?</span><a class="admin-link" href="#admin">관리자 로그인 →</a></div>
    </section>
  </div>
  <script>
    (()=>{const root=document.getElementById('loginUx'), forms={phone:root.querySelector('#phoneForm'),login:root.querySelector('#loginForm'),activate:root.querySelector('#activateForm',),notRegistered:root.querySelector('#notRegistered')},title=root.querySelector('#title'),subtitle=root.querySelector('#subtitle'),steps=[...root.querySelectorAll('.step')],msg=root.querySelector('#message');function show(step){Object.values(forms).forEach(x=>x.classList.add('hidden'));forms[step].classList.remove('hidden');let data={phone:['학생 로그인','등록된 휴대전화로 계정을 확인합니다.',0],login:['비밀번호 입력','안전한 학습 공간으로 이동합니다.',1],activate:['계정 활성화','본인 확인 후 새 비밀번호를 설정합니다.',2],notRegistered:['등록 안내','관리자에게 등록을 문의해 주세요.',0]}[step];title.textContent=data[0];subtitle.textContent=data[1];steps.forEach((x,i)=>x.classList.toggle('on',i<=data[2]));msg.classList.add('hidden')}root.querySelector('#phoneForm').addEventListener('submit',e=>{e.preventDefault();show(root.querySelector('#phone').value.endsWith('0')?'notRegistered':'login')});root.querySelector('#loginForm').addEventListener('submit',e=>{e.preventDefault();msg.textContent='로그인 성공 · /home으로 이동';msg.className='notice';});root.querySelector('#activateForm').addEventListener('submit',e=>{e.preventDefault();show('login');msg.textContent='계정이 활성화되었습니다. 비밀번호로 로그인해 주세요.';msg.className='notice'});root.querySelectorAll('.back').forEach(x=>x.addEventListener('click',()=>show('phone')));})();
  </script>
</div>
